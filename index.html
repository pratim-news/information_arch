<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Consumer 2.0 Data Model | Interactive</title>
  <style>
    :root {
      --ink: #17202a;
      --muted: #5d6d7e;
      --line: #d5dde8;
      --bg: #f4f7fb;
      --panel: #fff;
      --accent: #164b7a;
      --accent-soft: #e8f0f8;
      --stage: #1a3a5c;
      --cap: #8b1e1e;
      --obj: #2c5282;
      --sor: #1f5c3f;
      --mc: #7a5c16;
      --warn: #7a4a16;
      --nav-w: 240px;
      --detail-w: 320px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font: 14px/1.45 "Segoe UI", Arial, sans-serif; color: var(--ink); background: var(--bg); }
    a { color: var(--accent); }
    .app { display: grid; grid-template-columns: var(--nav-w) 1fr var(--detail-w); min-height: 100vh; }
    .nav { background: var(--stage); color: #fff; padding: 16px 12px; overflow-y: auto; }
    .nav h1 { font-size: 15px; margin: 0 0 4px; line-height: 1.3; }
    .nav .sub { font-size: 11px; opacity: .75; margin-bottom: 16px; }
    .nav button {
      display: block; width: 100%; text-align: left; border: 0; background: transparent;
      color: #c8d8ea; padding: 10px 10px; margin: 2px 0; border-radius: 6px; cursor: pointer; font: inherit;
    }
    .nav button:hover { background: rgba(255,255,255,.08); color: #fff; }
    .nav button.active { background: var(--accent); color: #fff; font-weight: 600; }
    .nav .layer-num { opacity: .6; font-size: 11px; margin-right: 6px; }
    .main { padding: 20px 24px 40px; overflow: auto; }
    .detail {
      background: var(--panel); border-left: 1px solid var(--line); padding: 16px;
      overflow-y: auto; position: sticky; top: 0; height: 100vh;
    }
    .detail h2 { font-size: 16px; margin: 0 0 8px; color: var(--accent); }
    .detail .empty { color: var(--muted); font-size: 13px; margin-top: 40px; text-align: center; }
    .detail dl { margin: 12px 0 0; font-size: 13px; }
    .detail dt { font-weight: 600; color: var(--muted); font-size: 11px; text-transform: uppercase; margin-top: 10px; }
    .detail dd { margin: 4px 0 0; }
    .detail .actions { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 6px; }
    .detail .actions button {
      font-size: 12px; padding: 5px 10px; border-radius: 5px; border: 1px solid var(--line);
      background: var(--accent-soft); cursor: pointer; color: var(--accent);
    }
    .layer-head { margin-bottom: 16px; }
    .layer-head h2 { font-size: 22px; margin: 0 0 6px; }
    .layer-head p { margin: 0; color: var(--muted); max-width: 52em; }
    .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
    .toolbar label { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .ref-img { max-width: 100%; border: 1px solid var(--line); border-radius: 8px; margin-top: 12px; display: none; }
    .ref-img.show { display: block; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px; overflow: auto; }

    /* Value chain grid */
    .vc-grid {
      display: grid;
      grid-template-columns: 140px repeat(7, minmax(100px, 1fr));
      gap: 2px;
      font-size: 11px;
      min-width: 900px;
    }
    .vc-grid .corner { background: var(--stage); color: #fff; padding: 8px; font-weight: 600; }
    .vc-grid .stage-hdr {
      background: var(--stage); color: #fff; padding: 8px 6px; text-align: center; font-weight: 600;
    }
    .vc-grid .stage-hdr small { display: block; font-weight: 400; opacity: .85; font-size: 10px; margin-top: 3px; }
    .vc-grid .plat-hdr {
      background: #e8eef5; padding: 8px; font-weight: 600; display: flex; flex-direction: column; justify-content: center;
    }
    .vc-grid .plat-hdr small { font-weight: 400; color: var(--muted); font-size: 10px; }
    .vc-cell {
      background: #fafcfe; border: 1px solid var(--line); padding: 6px; min-height: 52px;
      cursor: pointer; transition: background .15s, box-shadow .15s;
    }
    .vc-cell:hover, .vc-cell.sel { background: var(--accent-soft); box-shadow: inset 0 0 0 2px var(--accent); }
    .vc-cell .cap { color: var(--cap); font-weight: 600; font-size: 10px; line-height: 1.25; }
    .vc-cell .obj { color: var(--obj); font-size: 10px; margin-top: 3px; border: 1px solid #b8cfe0; border-radius: 10px; display: inline-block; padding: 1px 6px; background: #fff; }
    .vc-cell .vc-block { margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px dashed var(--line); }
    .vc-cell .vc-block:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: 0; }
    .standalone-bar { margin-top: 14px; padding: 12px; background: var(--panel); border: 1px dashed var(--line); border-radius: 8px; }
    .standalone-bar h4 { margin: 0 0 8px; font-size: 12px; color: var(--muted); text-transform: uppercase; }
    .vc-cell.empty { background: #f0f2f5; cursor: default; }
    .vc-cell.span-all { grid-column: 2 / -1; }

    /* Capability groups */
    .cap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .cap-group { border: 2px solid var(--cap); border-radius: 8px; padding: 10px; background: #fff; cursor: pointer; }
    .cap-group:hover, .cap-group.sel { box-shadow: 0 0 0 2px var(--accent); }
    .cap-group h3 { margin: 0 0 8px; font-size: 12px; color: var(--cap); text-transform: uppercase; letter-spacing: .03em; }
    .cap-group.asset h3 { color: #6b2d8a; }
    .cap-group.plat h3 { color: var(--accent); }
    .entity-chip {
      display: inline-block; margin: 3px 4px 3px 0; padding: 4px 8px; border-radius: 6px;
      background: #eef4fb; border: 1px solid #c5d5e8; font-size: 12px; cursor: pointer;
    }
    .entity-chip:hover, .entity-chip.sel { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* SoR matrix */
    .sor-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .sor-table th, .sor-table td { border: 1px solid var(--line); padding: 8px; text-align: center; }
    .sor-table th { background: #e8eef5; font-size: 11px; }
    .sor-table .entity-col { text-align: left; font-weight: 600; background: #fafcfe; min-width: 140px; }
    .sor-table .section-row td { background: #dde5ef; font-weight: 700; text-align: left; }
    .sor-cell { cursor: pointer; border-radius: 4px; min-width: 48px; }
    .sor-cell:hover { outline: 2px solid var(--accent); }
    .sor-cell.sor { background: #d4eddf; color: var(--sor); font-weight: 700; }
    .sor-cell.mc { background: #f5ecd4; color: var(--mc); font-weight: 600; }
    .sor-cell.ref { background: #e8e8f0; }
    .sor-cell.x { background: #f0f0f0; color: #aaa; }
    .sor-cell.sel { outline: 3px solid var(--accent); }

    .legend { display: flex; flex-wrap: wrap; gap: 12px; margin: 12px 0; font-size: 12px; }
    .legend span { display: flex; align-items: center; gap: 5px; }
    .legend i { width: 14px; height: 14px; border-radius: 3px; display: inline-block; border: 1px solid var(--line); }
    .breadcrumb { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .breadcrumb strong { color: var(--accent); }
    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      .nav { display: flex; flex-wrap: wrap; gap: 4px; padding: 10px; }
      .nav button { width: auto; }
      .detail { position: fixed; right: 0; top: 0; width: min(100%, 360px); z-index: 10; box-shadow: -4px 0 20px rgba(0,0,0,.12); transform: translateX(100%); transition: transform .2s; }
      .detail.open { transform: translateX(0); }
    }

    /* Value chain editor */
    .vc-editor { margin-bottom: 16px; }
    .vc-ed-toggle {
      font-size: 13px; padding: 10px 16px; border-radius: 6px; border: 1px solid var(--accent);
      background: var(--accent-soft); color: var(--accent); cursor: pointer; font-weight: 600;
    }
    .vc-ed-toggle:hover { background: var(--accent); color: #fff; }
    .vc-ed-panel {
      margin-top: 12px; padding: 0; border: 1px solid var(--line); border-radius: 10px;
      background: #f7fafc; max-height: min(70vh, 640px); overflow: auto;
      display: flex; flex-direction: column;
    }
    /* Author display:flex must not override the HTML hidden attribute */
    .vc-ed-panel[hidden] { display: none !important; }
    .vc-ed-toolbar {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      padding: 12px 14px; background: #fff; border-bottom: 1px solid var(--line);
      position: sticky; top: 0; z-index: 2;
    }
    .vc-ed-toolbar button { font-size: 12px; padding: 7px 12px; border-radius: 5px; border: 1px solid var(--line); background: #fff; cursor: pointer; }
    .vc-ed-toolbar button.vc-ed-primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
    .vc-ed-toolbar button.vc-ed-danger { color: #8b1e1e; border-color: #e0b4b4; }
    .vc-ed-status { font-size: 12px; color: var(--muted); flex: 1 1 180px; }
    .vc-ed-steps {
      display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px;
      padding: 10px 14px; background: #eef4fb; border-bottom: 1px solid var(--line); font-size: 12px; color: var(--ink);
    }
    .vc-ed-steps span { background: #fff; border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px; }
    .vc-ed-steps b { color: var(--accent); }
    .vc-ed-body { padding: 14px; }
    .vc-ed-hint { font-size: 12px; color: var(--muted); margin: 0 0 10px; }
    .vc-ed-table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 8px 0; }
    .vc-ed-table th, .vc-ed-table td { border: 1px solid var(--line); padding: 6px; text-align: left; }
    .vc-ed-table th { background: #e8eef5; }
    .vc-ed-table input, .vc-ed-table select { width: 100%; font: inherit; font-size: 12px; padding: 4px; }
    .vc-ed-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; margin: 8px 0; }
    .vc-ed-grid label { font-size: 11px; color: var(--muted); display: flex; flex-direction: column; gap: 3px; }
    .vc-ed-grid input, .vc-ed-grid select { font: inherit; padding: 5px; }
    .vc-ed-rowbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 8px; }
    .vc-ed-add { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-top: 8px; font-size: 12px; }
    .vc-ed-add input { padding: 5px; font: inherit; min-width: 120px; }
    details summary { cursor: pointer; font-weight: 600; color: var(--accent); margin: 10px 0 6px; }

    .vc-ed-layout { display: grid; grid-template-columns: 240px minmax(0, 1fr); gap: 14px; min-height: 320px; }
    .vc-ed-side { border: 1px solid var(--line); border-radius: 8px; background: #fff; display: flex; flex-direction: column; max-height: 480px; }
    .vc-ed-side-head { padding: 10px 12px; font-weight: 700; font-size: 12px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--line); }
    .vc-ed-rowlist { overflow: auto; flex: 1; padding: 6px; }
    .vc-ed-rowbtn { display: block; width: 100%; text-align: left; border: 0; background: transparent; padding: 9px 10px; border-radius: 6px; cursor: pointer; margin-bottom: 2px; }
    .vc-ed-rowbtn strong { display: block; font-size: 13px; color: var(--ink); }
    .vc-ed-rowbtn span { font-size: 11px; color: var(--muted); }
    .vc-ed-rowbtn:hover { background: var(--accent-soft); }
    .vc-ed-rowbtn.on { background: var(--accent); }
    .vc-ed-rowbtn.on strong, .vc-ed-rowbtn.on span { color: #fff; }
    .vc-ed-side-actions { display: flex; gap: 6px; padding: 8px; border-top: 1px solid var(--line); }
    .vc-ed-side-actions button { flex: 1; font-size: 12px; padding: 7px; cursor: pointer; }
    .vc-ed-main { min-width: 0; }
    .vc-ed-rowmeta { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; margin-bottom: 12px; }
    .vc-ed-rowmeta label, .vc-ed-band label, .vc-ed-block label { display: flex; flex-direction: column; gap: 3px; font-size: 11px; color: var(--muted); }
    .vc-ed-rowmeta input, .vc-ed-rowmeta select, .vc-ed-band input, .vc-ed-band select, .vc-ed-block input { font: inherit; padding: 7px; border: 1px solid var(--line); border-radius: 5px; background: #fff; }
    .vc-ed-h4 { margin: 14px 0 8px; font-size: 13px; color: var(--accent); }
    .vc-ed-strip { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 6px; margin-bottom: 12px; }
    .vc-ed-chip { border: 1px solid var(--line); background: #f0f2f5; border-radius: 8px; padding: 10px 6px; cursor: pointer; text-align: center; min-height: 64px; }
    .vc-ed-chip em { display: block; font-style: normal; font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: .02em; }
    .vc-ed-chip span { display: block; font-size: 11px; margin-top: 6px; color: var(--ink); word-break: break-word; line-height: 1.25; }
    .vc-ed-chip.filled { background: #e8f0f8; border-color: #9bb8d4; }
    .vc-ed-chip.span { background: #e8f6ef; border-color: #8fc5a8; }
    .vc-ed-chip.on { outline: 2px solid var(--accent); background: #dceaf8; }
    .vc-ed-legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 11px; color: var(--muted); margin: 0 0 10px; }
    .vc-ed-legend i { display: inline-block; width: 12px; height: 12px; border-radius: 3px; border: 1px solid var(--line); vertical-align: -2px; margin-right: 4px; }
    .vc-ed-card { border: 1px solid var(--line); border-radius: 8px; padding: 12px; margin-bottom: 10px; background: #fff; }
    .vc-ed-card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; gap: 8px; }
    .vc-ed-band { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
    .vc-ed-block { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; align-items: end; margin-bottom: 8px; }
    .vc-ed-actions-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .vc-ed-actions-row button { font-size: 12px; padding: 7px 12px; cursor: pointer; border-radius: 5px; border: 1px solid var(--line); background: #fff; }
    @media (max-width: 900px) {
      .vc-ed-layout { grid-template-columns: 1fr; }
      .vc-ed-rowmeta { grid-template-columns: 1fr 1fr; }
      .vc-ed-strip { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .vc-ed-block { grid-template-columns: 1fr; }
      .vc-ed-steps { grid-template-columns: 1fr; }
    }
  </style>
</head>

(function () {
  let STAGES = [];
  let SHOPFRONT_STAGES = {};
  let VC_ROWS = [];
  let vcDocument = null;

  function rowStages(row) {
    return row.stages === 'SHOPFRONT_STAGES' ? SHOPFRONT_STAGES : row.stages;

  function applyValueChainDocument(doc) {
    vcDocument = typeof FSS_VC !== 'undefined' ? FSS_VC.deepClone(doc) : JSON.parse(JSON.stringify(doc));
    if (typeof FSS_VC !== 'undefined') {
      const compiled = FSS_VC.compile(vcDocument);
      STAGES = compiled.STAGES;
      SHOPFRONT_STAGES = compiled.SHOPFRONT_STAGES;
      VC_ROWS = compiled.VC_ROWS;
      return;
    }
    function block(b) {
      return { cap: b.cap || '', obj: b.obj || '', e: b.entity == null || b.entity === '' ? null : b.entity };
    }
    function range(from, to) {
      const ids = (doc.stages || []).map((s) => s.id);
      const a = ids.indexOf(from);
      const b = ids.indexOf(to);
      return ids.slice(Math.min(a, b), Math.max(a, b) + 1);
    }
    function normSpans(obj) {
      if (!obj) return [];
      if (Array.isArray(obj.spans)) return obj.spans;
      if (obj.span) return [obj.span];
      return [];
    }
    function compileSpans(src) {
      return normSpans(src).map((sp) => {
        const b = (sp.blocks && sp.blocks[0]) || {};
        return { spanStages: range(sp.from, sp.to), cell: block(b), from: sp.from, to: sp.to };
      }).filter((s) => s.spanStages.length);
    }
    function tplStages(tpl) {
      const stages = {};
      const cells = tpl && tpl.cells ? tpl.cells : tpl || {};
      Object.keys(cells).forEach((k) => {
        if (k === 'cells' || k === 'span' || k === 'spans') return;
        if (cells[k] && (cells[k].cap != null || cells[k].obj != null)) stages[k] = block(cells[k]);
      });
      return stages;
    }
    STAGES = (doc.stages || []).map((s) => ({ id: s.id, label: s.label, journey: s.journey }));
    const tpl = doc.shopfrontTemplate || {};
    SHOPFRONT_STAGES = tplStages(tpl);
    VC_ROWS = (doc.rows || []).map((row) => {
      const base = { id: row.id, label: row.label, sub: row.sub || '' };
      if (row.useShopfrontTemplate) {
        return { ...base, stages: tplStages(tpl), spans: compileSpans(tpl) };
      }
      const stages = {};
      Object.keys(row.cells || {}).forEach((stageId) => {
        const blocks = row.cells[stageId];
        if (!blocks || !blocks.length) return;
        stages[stageId] = blocks.length === 1 ? block(blocks[0]) : { multi: blocks.map(block) };
      });
      return { ...base, stages, spans: compileSpans(row) };
    });
  }

      html += `<div class="plat-hdr">${esc(row.label)}<small>${esc(row.sub)}</small></div>`;
      const rs = rowStages(row) || {};
      // Support multi-band rows: spans[], plus legacy spanStages+cell
      const spans = (row.spans && row.spans.length)
        ? row.spans
        : (row.spanStages && row.spanStages.length ? [{ spanStages: row.spanStages, cell: row.cell }] : []);
      const covered = new Set();
      spans.forEach((sp) => (sp.spanStages || []).forEach((id) => covered.add(id)));
      STAGES.forEach(st => {
        const startSpan = spans.find((sp) => sp.spanStages && sp.spanStages[0] === st.id);
        if (startSpan) {
          const c = startSpan.cell || {};
          const start = stageCol(startSpan.spanStages[0]);
          const end = stageCol(startSpan.spanStages[startSpan.spanStages.length - 1]) + 1;

          return;
        }
        if (covered.has(st.id)) return;
        const c = rs[st.id];
        if (!c) html += '<div class="vc-cell empty"></div>';
        else {
          const eid = c.e || (c.multi && c.multi[0].e) || '';
          html += `<div class="vc-cell" data-e="${esc(eid)}" data-stage="${st.id}" data-plat="${esc(row.id)}">${cellHtml(c, row, st.id)}</div>`;

        const e = ENTITIES[eid];
        if (e) html += `<span class="entity-chip" data-e="${eid}">${esc(e.name)}</span>`;
      });
      html += '</div>';
    });
    return html + '</div>' + renderStandaloneBar('asset');
  }

  function renderSoRTable(section, data, cols) {
    let html = `<table class="sor-table"><thead><tr><th>Entity</th>`;
    cols.forEach(c => { html += `<th>${esc(SOR_LABELS[c])}</th>`; });
    html += '</tr></thead><tbody>';
    html += `<tr class="section-row"><td colspan="${cols.length + 1}">${esc(section)}</td></tr>`;
    Object.keys(data).forEach(key => {
      const row = data[key];
      html += `<tr><td class="entity-col" data-e="${esc(row.entity)}">${esc(row.label)}</td>`;
      cols.forEach(col => {
        const val = row.cells[col] || '-';
        html += `<td class="sor-cell ${sorClass(val)}" data-sor="${esc(val)}" data-e="${esc(row.entity)}" data-col="${col}" data-section="${esc(section)}">${esc(val)}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    return html;
  }

  const SOR_COLS_REG = ['sfcrm', 'auth0', 'zephr', 'zuora', 'ods', 'sfmcA', 'sfmce'];

  function renderDataMaster() {
    return `<div class="legend">
      <span><i style="background:#d4eddf"></i> SoR (System of Record)</span>
      <span><i style="background:#f5ecd4"></i> MC (Managed Copy)</span>
      <span><i style="background:#e8e8f0"></i> Ref</span>
      <span><i style="background:#f0f0f0"></i> X / N/A</span>
    </div>
    <div class="panel">${renderSoRTable('Registration', SOR_REG, SOR_COLS_REG)}<br/>${renderSoRTable('Subscription', SOR_SUB, SOR_COLS)}</div>`;
  }

  function renderMigration() {
    let html = `<div class="panel"><table class="sor-table"><thead><tr><th>Entity</th>`;
    MIG_COLS.forEach(c => { html += `<th>${esc(MIG_LABELS[c])}</th>`; });
    html += '</tr></thead><tbody>';
    MIG_ROWS.forEach(row => {
      html += `<tr><td class="entity-col" data-e="${esc(row.entity)}">${esc(row.label)}</td>`;
      MIG_COLS.forEach(col => {
        const val = (row.cells && row.cells[col]) || '-';
        html += `<td class="sor-cell" data-mig="${esc(val)}" data-e="${esc(row.entity)}" data-col="${col}">${esc(val)}</td>`;
      });
      html += '</tr>';
      if (row.cells && row.cells.note) {
        html += `<tr><td colspan="${MIG_COLS.length + 1}" style="text-align:left;font-size:11px;color:var(--warn)">Note: ${esc(row.cells.note)}</td></tr>`;
      }
    });
    html += '</tbody></table></div>';
    return html;
  }

  function renderLayer() {
    const L = LAYERS[currentLayer];
    let body = '';
    if (currentLayer === 'valuechain') body = renderValueChain();
    else if (currentLayer === 'capability') body = renderCapGroups('capability');
    else if (currentLayer === 'asset') body = renderAssetLayer();
    else if (currentLayer === 'platform') body = renderCapGroups('platform');
    else if (currentLayer === 'datamaster') body = renderDataMaster();
    else if (currentLayer === 'migration') body = renderMigration();

    main.innerHTML = `
      <div class="breadcrumb">Layer <strong>${Object.keys(LAYERS).indexOf(currentLayer) + 1}</strong> of 6</div>
      <div class="layer-head"><h2>${esc(L.title)}</h2><p>${esc(L.desc)}</p></div>
      <div id="vc-editor-slot"></div>
      <div class="toolbar">
        <label><input type="checkbox" id="show-ref" /> Show reference slide image</label>
      </div>
      ${body}
      <img class="ref-img" id="ref-img" src="${esc(L.img)}" alt="Reference slide" />
    `;
    if (currentLayer === 'valuechain') {
      const slot = document.getElementById('vc-editor-slot');
      if (slot && typeof FSS_VC !== 'undefined') {
        vcEditorApi = FSS_VC.mountEditor(slot, {
          getData: () => vcDocument,
          setData: (d) => { vcDocument = d; },
          onApply: (d) => {
            applyValueChainDocument(d);
            renderLayer();
          },
          onStatus: () => updateVcStatus(),
        });
      } else if (slot) {
        slot.innerHTML = '<p class="vc-ed-hint">Editor requires vc-data.js (serve this folder via HTTP or GitHub Pages). Grid data is loaded from the bundled copy.</p>';
      }
      updateVcStatus();
    }
    document.getElementById('show-ref').addEventListener('change', function () {
      document.getElementById('ref-img').classList.toggle('show', this.checked);
    });
    bindClicks();
    highlightSelection();
  }

  function showDetail(payload) {
    selection = payload;
    detailEmpty.hidden = true;
    detailBody.hidden = false;
    detailPanel.classList.add('open');

    const e = payload.entityId ? ENTITIES[payload.entityId] : null;
    let html = `<h2>${esc(payload.title || (e && e.name) || 'Detail')}</h2>`;

    if (payload.type === 'vc') {
      html += `<dl>
        <dt>Value chain stage</dt><dd>${esc(STAGES.find(s => s.id === payload.stage)?.label || payload.stage)}</dd>
        <dt>Platform</dt><dd>${esc(payload.platformLabel || '')}</dd>
        <dt>Capability</dt><dd>${esc(payload.capability || '')}</dd>
        <dt>Business object</dt><dd>${esc(payload.object || '-')}</dd>
      </dl>`;
    } else if (payload.type === 'sor') {
      html += `<dl>
        <dt>Lifecycle section</dt><dd>${esc(payload.section)}</dd>
        <dt>System</dt><dd>${esc(SOR_LABELS[payload.col] || payload.col)}</dd>
        <dt>Role</dt><dd><strong>${esc(payload.sor)}</strong></dd>
      </dl>`;
    } else if (payload.type === 'mig') {
      html += `<dl>
        <dt>Migration system</dt><dd>${esc(MIG_LABELS[payload.col] || payload.col)}</dd>
        <dt>Value</dt><dd>${esc(payload.mig)}</dd>
      </dl>`;
    }

    if (e) {
      const related = relatedIds(payload.entityId).filter((id) => id !== payload.entityId && ENTITIES[id]);
      html += `<dl>
        <dt>Business capability</dt><dd>${esc(e.capability)}</dd>
        <dt>Information asset</dt><dd>${esc(e.asset)}</dd>
        <dt>Platform (overlay)</dt><dd>${esc(e.platform)}</dd>
        ${related.length ? `<dt>Also highlights</dt><dd>${esc(related.map((id) => ENTITIES[id].name).join(', '))}</dd>` : ''}
      </dl>`;
    }

    html += `<div class="actions">
      <button type="button" data-goto="valuechain">Value chain</button>
      <button type="button" data-goto="capability">Capabilities</button>
      <button type="button" data-goto="asset">Information assets</button>
      <button type="button" data-goto="platform">Platforms</button>
      <button type="button" data-goto="datamaster">SoR / MC</button>
      <button type="button" data-goto="migration">Migration</button>
    </div>`;

    detailBody.innerHTML = html;
    detailBody.querySelectorAll('[data-goto]').forEach(btn => {
      btn.addEventListener('click', () => {
        const keep = selection;
        switchLayer(btn.dataset.goto);
        if (keep && keep.entityId) {
          selection = keep;
          highlightSelection();
        }
      });
    });
    highlightSelection();
  }

  function highlightSelection() {
    document.querySelectorAll('.sel').forEach(el => el.classList.remove('sel'));
    if (!selection || !selection.entityId) return;
    const ids = relatedIds(selection.entityId);
    ids.forEach((id) => {
      document.querySelectorAll(`[data-e="${id}"]`).forEach(el => el.classList.add('sel'));
    });
    document.querySelectorAll('.cap-group').forEach((grp) => {
      if (ids.some((id) => grp.querySelector(`[data-e="${id}"]`))) grp.classList.add('sel');
    });
  }

  function bindClicks() {
    main.querySelectorAll('.vc-cell:not(.empty)').forEach(cell => {
      cell.addEventListener('click', () => {
        const eid = cell.dataset.e;
        const row = VC_ROWS.find(r => r.id === cell.dataset.plat);
        const st = cell.dataset.stage;
        let stageData;
        if (row) {
          const spans = (row.spans && row.spans.length)
            ? row.spans
            : (row.spanStages ? [{ spanStages: row.spanStages, cell: row.cell }] : []);
          const hit = spans.find((sp) => (sp.spanStages || []).includes(st));
          if (hit) stageData = hit.cell;
          else {
            const rs = rowStages(row);
            stageData = rs && rs[st];
          }
        }
        const entityId = eid || (stageData && (stageData.e || (stageData.multi && stageData.multi[0].e)));
        showDetail({
          type: 'vc', entityId: entityId || null,
          title: stageData && (stageData.obj || (stageData.multi && stageData.multi.map(m => m.obj).join(', '))),
          stage: st, platformLabel: row ? row.label + ' (' + row.sub + ')' : '',
          capability: stageData && (stageData.cap || (stageData.multi && stageData.multi.map(m => m.cap).join(' / '))),
          object: stageData && (stageData.obj || (stageData.multi && stageData.multi.map(m => m.obj).join(', ')))
        });
      });
    });
    main.querySelectorAll('.entity-chip').forEach(chip => {
      chip.addEventListener('click', ev => {
        ev.stopPropagation();
        showDetail({ type: 'entity', entityId: chip.dataset.e, title: ENTITIES[chip.dataset.e]?.name });
      });
    });
    main.querySelectorAll('.cap-group').forEach(grp => {
      grp.addEventListener('click', ev => {
        if (ev.target.classList.contains('entity-chip')) return;
        showDetail({ type: 'group', title: grp.querySelector('h3').textContent });
      });
    });
    main.querySelectorAll('.sor-cell').forEach(cell => {
      cell.addEventListener('click', () => {
        if (cell.dataset.mig !== undefined) {
          showDetail({ type: 'mig', entityId: cell.dataset.e, col: cell.dataset.col, mig: cell.dataset.mig, title: ENTITIES[cell.dataset.e]?.name });
        } else {
          showDetail({ type: 'sor', entityId: cell.dataset.e, col: cell.dataset.col, sor: cell.dataset.sor, section: cell.dataset.section, title: ENTITIES[cell.dataset.e]?.name });
        }
      });
    });
    main.querySelectorAll('.entity-col[data-e]').forEach(cell => {
      cell.addEventListener('click', () => showDetail({ type: 'entity', entityId: cell.dataset.e, title: ENTITIES[cell.dataset.e]?.name }));
    });
  }

  function switchLayer(id) {
    currentLayer = id;
    document.querySelectorAll('.nav button').forEach(b => b.classList.toggle('active', b.dataset.layer === id));
    renderLayer();
  }

  document.querySelectorAll('.nav button').forEach(btn => {
    btn.addEventListener('click', () => switchLayer(btn.dataset.layer));
  });

  async function bootstrap() {
    function escMsg(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    if (typeof FSS_VC === 'undefined') {
      // Fallback: compile embedded JSON without vc-data.js (file:// / offline)
      const el = document.getElementById('vc-published-data');
      try {
        const data = JSON.parse(el.textContent);
        applyValueChainDocument(data);
        vcSourceLabel = 'Bundled copy in page (vc-data.js not loaded)';
      } catch (e) {
        main.innerHTML = '<p style="color:#8b1e1e;padding:24px">Could not load value chain data.</p>';
        return;
      }
    } else {
      try {
        const resolved = await FSS_VC.resolveInitialData();
        vcSourceLabel = resolved.label;
        applyValueChainDocument(resolved.data);
      } catch (e) {
        main.innerHTML = '<p style="color:#8b1e1e;padding:24px">' + escMsg(e.message) + '</p>';
        return;
      }
    }

    const urlParams = new URLSearchParams(location.search);
    if (urlParams.get('layer') && LAYERS[urlParams.get('layer')]) {
      currentLayer = urlParams.get('layer');
      document.querySelectorAll('.nav button').forEach(b => b.classList.toggle('active', b.dataset.layer === currentLayer));
    }
    renderLayer();
    if (urlParams.get('e') && ENTITIES[urlParams.get('e')]) {
      showDetail({ type: 'entity', entityId: urlParams.get('e'), title: ENTITIES[urlParams.get('e')].name });
    }
  }

  bootstrap();
})();
</script>
</body>
</html>
